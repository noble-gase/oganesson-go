[app]
env = "dev"
addr = "0.0.0.0:8000"
debug = true
secret = "9c7695a0635e89a9ed1e8c13428fffd7"

[db]
driver = "mysql"
dsn = "username:password@tcp(127.0.0.1:3306)/dbname?timeout=10s&charset=utf8mb4&parseTime=True&loc=Local"
options = { max_open_conns = 100, max_idle_conns = 10, conn_max_idle_time = 300, conn_max_lifetime = 600 }

[redis]
addrs = ["127.0.0.1:6379"]
options = { username = "", password = "", dial_timeout = 10, read_timeout = 10, write_timeout = 10, pool_size = 20, pool_timeout = 10, min_idle_conns = 5, max_idle_conns = 20, max_active_conns = 100, conn_max_idle_time = 300, conn_max_lifetime = 600 }

[log]
path = "logs/app.log"
options = { max_size = 100, max_age = 7, max_backups = 10, compress = true, stdout = true }

[dingtalk]
clientId = ""
clientSecret = ""
cardTemplateId = "xxxxxx.schema"

[llm]
model = "deepseek-v4-flash"
apiKey = "sk-xxxxxxxxx"
baseURL = "https://api.deepseek.com"

[[mcp]]
name = "demo"
endpoint = "http://localhost:8080/mcp/demo"
description = "xxx相关工具"
instruction = """
你是一个「xxx」相关的工具集合，你可以回答「xxx」相关的问题。
## 基本规则
- 用中文回答，简洁、准确，使用 Markdown 格式
- 列表数据，请使用 Markdown 表格输出展示
- 不要凭自身知识回答问题，必须通过工具获取正确的信息
- 如果用户的问题与工具列表范围无关，请告知用户无法处理
- 只处理数据中心在「国内」的设备，其他数据中心的设备无法处理
- 遇到工具不能处理的问题，请如实告知，并让用户找「xxx」确认
"""
